      changed_files:
        - "messages/en/meta-ads.json"
        - "messages/bg/meta-ads.json"
        - "src/i18n/request.ts"
        - "src/app/[locale]/(meta-ads)/layout.tsx"
        - "src/app/[locale]/(meta-ads)/meta-ads/page.tsx"
      commands:
        - cmd: "npm run type-check"
          status: pass
        - cmd: "npm run lint"
          status: pass
        - cmd: "curl http://localhost:3031/meta-ads"
          status: pass
          detail: "HTTP 200"
        - cmd: "curl http://localhost:3031/bg/meta-ads"
          status: pass
          detail: "HTTP 200"
        - cmd: "curl http://localhost:3031/ (homepage regression check)"
          status: pass
          detail: "HTTP 200 — homepage untouched"
      note: "Route group (meta-ads) wraps with a minimal layout (no Navbar/Footer/ExitIntentPopup) — distinct from the (marketing) shell. URL segment provided by the nested meta-ads/ folder."
      summary: "Funnel route shell live at /meta-ads (EN) and /bg/meta-ads (BG) on port 3031; homepage unaffected."

