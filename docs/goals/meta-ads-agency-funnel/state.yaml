tasks:
  - id: T001
    type: judge
    assignee: Judge
    status: done
    reasoning_hint: high
    objective: "Validate the PRD against the existing NewAge repo and lock the first Worker package for the route group scaffold."
    inputs:
      - docs/prd/meta-ads-agency-funnel.md
      - CLAUDE.md
      - src/app/layout.tsx
      - src/app/[locale]/layout.tsx
      - src/app/[locale]/(marketing)/layout.tsx
      - src/middleware.ts
      - src/i18n/routing.ts
      - src/lib/db.ts
      - src/lib/db-schema.ts
      - src/app/api/leads/route.ts
      - package.json
    constraints:
      - "Read-only."
    expected_output:
      - "Decision"
      - "Corrections to T002 allowed_files (true route path)"
      - "Corrections to T004 allowed_files (leads schema migration)"
      - "Confirmation of bilingual mechanics, port 3031, and styling tokens"
    receipt:
      result: done
      decision: "approved with corrections"
      full_outcome_complete: false
      rationale: |
        PRD is operationalizable. The repo has completed the next-intl [locale] refactor (committed as 892e7be), so route groups now live UNDER src/app/[locale]/.
        Therefore the new funnel must live at src/app/[locale]/(meta-ads)/, NOT src/app/(meta-ads)/.
        Messages live at repo-root messages/<locale>/<namespace>.json (not src/messages/), with locales en + bg, defaultLocale en, localePrefix 'as-needed' — so /meta-ads (EN) and /bg/meta-ads (BG) are correct URLs.
        Turso `leads` table currently constrains source IN ('popup','contact','newsletter'); adding 'meta-ads' requires a recreate-table migration inside lib/db-schema.ts (SQLite cannot ALTER CHECK).
        Existing marketing layout wraps with Navbar/Footer/ExitIntentPopup — the meta-ads funnel needs its own minimal layout (a distinct funnel, not the agency shell).
        Fonts (plusJakarta, inter, jetbrainsMono) and globals.css are already wired at the [locale] layout level via CSS variables — the meta-ads layout inherits them.
        Port 3031 confirmed: `npm run dev -- -p 3031` uses Next.js Turbopack flag passthrough.
      corrections:
        - "T002–T007 allowed_files: replace 'src/app/(meta-ads)/**' with 'src/app/[locale]/(meta-ads)/**'."
        - "T002–T007 message files: replace 'src/messages/' with 'messages/' (repo-root) and add a new namespace 'meta-ads.json' per locale."
        - "T004 allowed_files: include src/lib/db-schema.ts so the migration can land (CHECK constraint widening)."
        - "T002 layout: build a minimal meta-ads layout (no Navbar/Footer/ExitIntentPopup) — this funnel has its own shell."
        - "Verify command in T002: 'npm run dev -- -p 3031' should be 'PORT=3031 npm run dev' or pass via -- -p 3031 — confirmed Next 15 accepts `next dev --turbopack -p 3031`."
      first_worker_locked: "T002"
      summary: "PRD validated. Three path corrections applied to T002+ allowed_files. T002 activated."

  - id: T002
    type: worker
    assignee: Worker
    status: done
    reasoning_hint: medium
    objective: "Scaffold src/app/[locale]/(meta-ads)/ route group with a minimal dark layout (no agency Navbar/Footer/ExitIntentPopup), and a placeholder /meta-ads page that renders the funnel title + a single CTA so the route is reachable at http://localhost:3031/meta-ads and http://localhost:3031/bg/meta-ads. Add a messages/<locale>/meta-ads.json namespace."
    allowed_files:
      - "src/app/[locale]/(meta-ads)/**"
      - "src/components/meta-ads/**"
      - "messages/en/meta-ads.json"
      - "messages/bg/meta-ads.json"
      - "src/i18n/request.ts"
    verify:
      - "npm run type-check"
      - "npm run lint"
      - "npm run dev -- -p 3031 (smoke: GET /meta-ads returns 200, GET /bg/meta-ads returns 200)"
    stop_if:
      - "Touching files in src/app/[locale]/(marketing) or src/app/[locale]/(legal)."
      - "Breaking the existing homepage at /."
      - "Verification fails twice."
    receipt:
