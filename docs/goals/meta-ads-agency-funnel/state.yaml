# GoalBuddy v2 state.yaml
# Board truth lives here. goal.md is the editable charter; notes/ holds long receipts only.

version: 2

goal:
  title: "Meta Ads Agency Client Funnel — end-to-end implementation"
  slug: "meta-ads-agency-funnel"
  kind: existing_plan
  tranche: "Implement every in-code part of PRD Phase 1 (Foundation) inside src/app/(meta-ads)/: landing page with all 6 mandatory sections, lead capture, Calendly booking, GoHighLevel webhook stub, Meta Pixel + CAPI + GA4 tracking. Verify the full funnel in a real browser at http://localhost:3031/meta-ads (and /bg/meta-ads). External account setup (Meta Ad Account, real Pixel ID, GHL sub-account, Calendly account) is owner-blocked but the integration code is ready and stubable via env vars. PRD Phases 2–4 (creative production, campaign launch, optimization) are out of scope for this tranche."
  status: done
  intake:
    original_request: "turn the prd into proper plan end to end fully implementing everything and testing in the real UI, if dev server - use less crowded port like 3031"
    interpreted_outcome: "A working Meta Ads agency funnel lives at /meta-ads (EN+BG), with hero/problem/solution/case-studies/offer/FAQ/CTA sections, a working lead capture form persisting to Turso, a Calendly booking embed, a Meta Pixel + CAPI + GA4 tracking layer, and a GHL webhook hand-off — all verified end-to-end in a real browser at port 3031."
    input_shape: existing_plan
    audience: "NewAge agency; the funnel will be used to attract Meta Ads clients (service businesses, personal brands, local businesses, high-ticket experts)."
    authority: approved
    proof_type: demo
    completion_proof: "Real-browser run of the full /meta-ads funnel at port 3031: page loads with all 6 sections, lead form submits to Turso, Calendly embed renders, Pixel/GA4 fire 'Lead' + 'Schedule' events, CAPI route accepts events, GHL webhook stub returns 200, BG and EN locales both work, mobile + desktop both pass. Captured by Playwright/Chrome MCP screenshots + console logs."
    likely_misfire: "Building a generic landing page inside the existing NewAge marketing layout instead of a distinct funnel; OR shipping planning + 6 small section components without lead capture, Calendly, tracking, and CRM wiring; OR skipping the real-browser verification at port 3031 and calling it done off type-check alone."
    blind_spots_considered:
      - "External services (Meta Pixel ID, Calendly URL, GHL webhook URL) need real owner-provided creds — code must be integration-ready with env-var placeholders so it does not block."
      - "The existing NewAge homepage and (marketing) layout must not regress when a new route group is added."
      - "Bilingual support (EN + BG) via next-intl must work for all new strings."
      - "Turso lead capture schema must distinguish meta-ads-funnel leads from generic contact/newsletter leads (existing `leads` table has 3 sources)."
      - "Port 3031 must be free or explicitly used — port 3000 is the default and likely occupied."
      - "Real-browser testing means Chrome MCP / Playwright, not just `npm run dev` + curl."
    existing_plan_facts:
      - "PRD lives at docs/prd/meta-ads-agency-funnel.md (sections 1–17)."
      - "Funnel structure: TOFU Ad → MOFU Landing Page → BOFU Call Funnel."
      - "Landing page must include 6 mandatory sections: Hero, Problem, Solution, Case studies, Offer + Process, FAQ, CTA — with Calendly + form CTAs."
      - "Tech stack pinned by PRD §10: Webflow/Framer/WordPress for funnel (alt), CRM=GoHighLevel, Tracking=GA4+Pixel+CAPI, Automation=Zapier/Make, Scheduling=Calendly. User chose to build inside NewAge Next.js repo as src/app/(meta-ads)/ route group."
      - "Execution plan per PRD §11: Phase 1 Foundation (in-scope) → Phase 2 Creative production (owner) → Phase 3 Campaign launch (owner) → Phase 4 Optimization (owner)."
      - "Critical items per PRD §12: strong offer, case studies, good landing page, fast follow-up, qualification, aggressive creative testing, clear ROI promise."
      - "Headline options per PRD §13."
      - "Dev server must run on port 3031, not default 3000."
      - "Repo conventions: Plus Jakarta Sans + Inter fonts, dark-first #0A0A0A bg, glass utility, gradient-text utility, easing [0.16, 1, 0.3, 1], @libsql/client/web for Turso, self-hosted fonts, SSG via generateStaticParams, three.js dynamic ssr:false, content via accessor functions."
      - "Gotcha per CLAUDE.md: no `output: 'export'` in next.config — API routes need server rendering."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true
  slice_policy:
    max_consecutive_tiny_tasks: 2
    prefer_vertical_slices: true
    judge_picks_largest_safe_slice: true
    worker_completes_whole_slice: true

agents:
  scout: installed
  worker: installed
  judge: installed

visual_board:
