        - cmd: "Playwright: navigate /meta-ads mobile 390x844, capture full-page"
          status: pass
          artifact: "docs/goals/meta-ads-agency-funnel/notes/T003-sections/en-mobile-fullpage.jpg"
        - cmd: "Console errors + warnings"
          status: pass
          detail: "0 errors, 0 warnings across all 4 navigations"
      gotcha_resolved: |
        Initial implementation used Framer Motion `whileInView` with `viewport={{ once: true, margin: '-80px' }}`.
        IntersectionObserver does NOT fire reliably during Playwright's full-page screenshot mode (it captures
        without truly scrolling), so all sections below the hero rendered blank at opacity 0.
        Fix: converted all section `whileInView` → `animate` (mount-time) via perl substitution across 8 files,
        dropping the `viewport` prop. Staggered delays (0.1s–0.6s) keep the cascading reveal feel on real-browser
        scroll; Playwright sees the final state after a 2s wait_for.
      summary: "All 6 mandatory PRD sections + lead form + booking + final CTA render in EN and BG, desktop and mobile, with zero console errors. Lead form posts to /api/leads/meta-ads (route lands in T004). Calendly section renders fallback (real iframe lands in T006)."

