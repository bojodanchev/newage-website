version: 2

goal:
  title: "Meta Ads Funnel — interactivity, real case-study articles, and AI editorial imagery"
  slug: "meta-ads-funnel-polish"
  kind: existing_plan
  tranche: "Lift /meta-ads from informational landing page to interactive + content-backed funnel: (1) medium interactivity — scroll-triggered reveals, animated metric counters in case studies, hover micro-interactions, animated process timeline; (2) 3 real blog articles, one per case study, each linked from its card via 'Read the breakdown →' CTA; (3) AI-generated cinematic editorial imagery — 3 per-case-study cover images + 1 Process/Solution diagram, all dark-moody-photographic in the NewAge palette, no text-in-image, generated via the gpt-image-2-prompt skill. Verify end-to-end in a real browser at port 3031, then ship to production via the standard auto-deploy."
  status: complete
  intake:
    original_request: "get the landing page more interactive - make sure the results are backed by a real blog article for example, and use /gpt-image-2-prompt for more visual stuff like images, cases etc. to have a more visual example in as well and see where we can add AI generated content (we can also add reference images for things needed)"
    interpreted_outcome: "Visitors to /meta-ads encounter (a) interactive scroll/hover behaviour and animated metrics rather than a static page, (b) case-study cards that link out to real blog articles instead of dead headlines, and (c) AI-generated editorial imagery on case-study cards + the Solution section that visually anchors the funnel narrative. /bg/meta-ads mirrors all of this. Verified in a real browser."
    input_shape: existing_plan
    audience: "Bojo (owner) + /meta-ads visitors — service businesses, personal brands, local businesses, high-ticket experts shopping a Meta Ads acquisition agency."
    authority: approved
    proof_type: demo
    completion_proof: "Real-browser pass at port 3031: case-study metric counters animate on scroll, hover-states fire, process timeline reveals progressively, 3 case-study cards have AI cover images + 'Read the breakdown →' CTA wired to a working blog article at /blog/<slug>, Solution section embeds the AI Process diagram, EN+BG both work, mobile + desktop both pass. Screenshots saved under notes/."
    likely_misfire: "Pure animation polish without real content (decorative scroll effects but case-study CTAs still dead-end), OR over-investing in one shiny interactive feature (e.g. a calculator) while case-study cards remain placeholder-flavoured, OR generating AI imagery that drifts off-brand (light/UI-mockup style) instead of the chosen cinematic editorial aesthetic."
    blind_spots_considered:
      - "Existing blog system at src/app/[locale]/(marketing)/blog uses a data accessor; new articles need to live in src/data/blog.ts (or similar) AND in messages/{en,bg}/blog.json — both halves must land or the article 404s in one locale."
      - "Case-study metrics are currently flagged 'indicative' — making them feel real via AI imagery + blog narrative could legally/ethically imply they're literal results. Each article should be honest framing (methodology breakdown rather than 'we did this for client X')."
      - "gpt-image-2-prompt skill writes prompts; the actual image generation happens externally (ChatGPT image UI or another model). The board must accept that images may not be ready in one /goal pass — Worker T004 will WRITE the prompts + a manifest the operator runs OR will dispatch the image-gen pipeline if a fully-automated path exists."
      - "Bilingual: blog articles must exist in EN + BG. Translation budget is real — either skip BG articles for now (link only EN article) or accept doubled write-time."
      - "Reference images: user mentioned 'we can also add reference images for things needed' — board should keep T100 (owner-blocked) open to receive them and re-run image-gen with refs."
      - "Brand cohesion: aesthetic locked to cinematic editorial / dark + NewAge palette / no text in image. Drift here ruins the page."
      - "Animated counters must respect prefers-reduced-motion or they're an accessibility regression."
    existing_plan_facts:
      - "Previous tranche docs/goals/meta-ads-agency-funnel/ is complete; /meta-ads is live in production at https://www.newagecontent.com/meta-ads with 9 sections."
      - "User-selected scope: Medium interactivity (no flagship calculator), 3 per-case-study articles, AI imagery for case-study covers + Process/Solution diagram only (no hero / no blog covers), cinematic editorial aesthetic."
      - "Skill to invoke during T004: gpt-image-2-prompt (DO NOT load during $goal-prep — only at /goal Worker time)."
      - "Optional later: owner may drop reference images; T100 keeps that door open."
      - "Dev port: 3031."
      - "i18n: next-intl with locales [en, bg], defaultLocale en, localePrefix 'as-needed'."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true
  slice_policy:
    max_consecutive_tiny_tasks: 2
    prefer_vertical_slices: true
    judge_picks_largest_safe_slice: true
    worker_completes_whole_slice: true

agents:
  scout: installed
  worker: installed
  judge: installed

visual_board:
  selected: local
  local:
    status: live
    url: "http://goalbuddy.localhost:41737/meta-ads-funnel-polish/"
    command: "npx goalbuddy board /Users/bojodanchev/NewAge/docs/goals/meta-ads-funnel-polish"
  github_projects:
    status: not_requested
    url: null
    command: "npx goalbuddy extend github-projects"
    missing: []

active_task: null

tasks:
  - id: T001
    type: judge
    assignee: Judge
    status: done
    reasoning_hint: high
    objective: "Validate the polish tranche against the live /meta-ads code and existing blog system; lock T002/T003/T004 specs."
    inputs:
      - src/app/[locale]/(meta-ads)/meta-ads/page.tsx
      - src/components/meta-ads
      - src/app/[locale]/(marketing)/blog
      - src/data
      - messages/en/blog.json
      - messages/bg/blog.json
      - docs/goals/meta-ads-agency-funnel/state.yaml
    constraints:
      - "Read-only."
      - "Do not load or invoke the gpt-image-2-prompt skill in this task."
      - "Confirm the data shape for a blog article and the route shape — does blog content live in src/data/blog.ts, MDX files, or messages JSON? Lock the T003 file plan to the existing convention."
      - "Decide whether T002 needs new dependencies (none expected — Framer Motion already in use)."
      - "Decide whether BG blog articles are in-scope for this tranche or queued behind a translation pass."
    expected_output:
      - "Decision on blog content storage shape"
      - "Locked T002 spec: which sections get animated counters, which get scroll-trigger reveals, which get hover micro-interactions; allowed_files; verify; stop_if"
      - "Locked T003 spec: blog article slugs (3), file plan, EN+BG decision, CTA wiring location in MetaAdsCaseStudies; allowed_files; verify; stop_if"
      - "Locked T004 spec: which gpt-image-2-prompt invocations (4 — three case-study covers + one process diagram); prompt-output destination (public/meta-ads/.../*.png); whether to dispatch image gen automatically or save prompts to a manifest the operator runs; allowed_files; verify; stop_if"
    receipt:
      result: done
      decision: "approved"
      full_outcome_complete: false
      rationale: |
        Blog system architecture is fully understood. Articles live in src/data/{en,bg}/blog-posts.ts as
        typed `BlogPost[]` arrays. Route is /blog/<slug> in EN and /bg/blog/<slug> in BG, generated via
        generateStaticParams. BlogCategory union includes 'case-studies' — perfect fit. Use the i18n
        Link from @/i18n/routing in MetaAdsCaseStudies so CTAs auto-locale-prefix.

        Previous tranche replaced Framer Motion whileInView→animate to satisfy Playwright's full-page
        screenshot pass (IntersectionObserver wasn't firing reliably in that mode). That gives real users
        an all-at-once entrance instead of cascading scroll reveals — a polish regression we now reverse.
        T002 will reintroduce whileInView with viewport={{ once: true, amount: 0.1 }} (no negative
        margin), and at-test-time Playwright will scroll through the page before screenshotting so
        observers fire. Combined with useReducedMotion() short-circuit.

        BG blog scope: in-scope but with concise BG translations (same structure, same headlines,
        condensed body) — owner can flesh out later. Goal is reachable CTAs in both locales.

        T004 image generation: the gpt-image-2-prompt skill writes prompts (not images). T004 will
        invoke the skill four times to produce clean prompts, save them in notes/T004-image-prompts.md,
        then attempt generation via the OpenAI Images API if OPENAI_API_KEY is in env (which it is on
        the user's machine for other workflows). Fallback: prompts manifest only, operator runs them in
        ChatGPT image UI. Either way, T004 ends with placeholder gradient images in public/ if no real
        AI images land — so the rendering wiring is verifiable independent of API availability.
      locked_specs:
        T002:
          summary: "Reintroduce whileInView scroll reveals (amount: 0.1), add CountUp metric counters in MetaAdsCaseStudies, hover micro-interactions on case-study + offer module cards, progressive Process timeline. useReducedMotion() short-circuits all."
          new_file: "src/lib/hooks/useCountUp.ts (custom hook for animated number counting, respecting reduced motion)"
        T003:
          summary: "Add 3 articles to src/data/en/blog-posts.ts (and concise BG versions to src/data/bg/blog-posts.ts). Slugs: meta-ads-cpl-breakdown, meta-ads-mrr-multiplier, meta-ads-booked-calls. Category: 'case-studies'. Wire 'Read the breakdown →' CTA in MetaAdsCaseStudies using i18n Link."
        T004:
          summary: "Invoke gpt-image-2-prompt 4x, save prompts to notes/T004-image-prompts.md, attempt OpenAI image gen if OPENAI_API_KEY present, fallback to placeholder gradients otherwise. Wire image rendering into MetaAdsCaseStudies (case study card top accent) and MetaAdsSolution (between headline and TOFU/MOFU/BOFU steps)."
      summary: "T001 done — T002 activated with confirmed scope. Blog data shape, route generation, and i18n Link mechanics all confirmed."

  - id: T002
    type: worker
    assignee: Worker
    status: done
    reasoning_hint: medium
    objective: "Add interactive polish to /meta-ads: animated count-up metric values in case-study cards, scroll-triggered reveal for Problem/Solution/Case-Studies/Offer sections (replacing the current mount-time animate so off-screen sections animate as you scroll), hover micro-interactions on case-study and offer module cards, and a sticky/progressive Process timeline that highlights the current step as it enters the viewport. Respect prefers-reduced-motion."
    allowed_files:
      - "src/components/meta-ads/**"
      - "src/lib/hooks/**"
      - "src/app/[locale]/(meta-ads)/**"
    verify:
      - "npm run type-check"
      - "npm run lint"
      - "Chrome MCP: navigate http://localhost:3031/meta-ads, scroll from top to bottom — sections reveal progressively (not all-at-once-on-mount), metric counters tick from 0 to target as Results enters view, hover on a case study card shows lift/shadow, process timeline highlights the active step"
      - "Chrome MCP: same flow at /bg/meta-ads — animations identical"
      - "Chrome MCP: emulate prefers-reduced-motion: counters render at final value immediately, no scroll reveals"
    stop_if:
      - "Animations cause layout shift > 0.1 CLS."
      - "prefers-reduced-motion not respected."
      - "Verification fails twice."
    receipt:
      result: done
      changed_files:
        - "src/lib/hooks/useCountUp.ts"
        - "src/components/meta-ads/MetaAdsCaseStudies.tsx"
        - "src/components/meta-ads/MetaAdsProblem.tsx"
        - "src/components/meta-ads/MetaAdsSolution.tsx"
        - "src/components/meta-ads/MetaAdsOffer.tsx"
        - "src/components/meta-ads/MetaAdsFAQ.tsx"
        - "src/components/meta-ads/MetaAdsLeadFormSection.tsx"
        - "src/components/meta-ads/MetaAdsBookingSection.tsx"
        - "src/components/meta-ads/MetaAdsFinalCTA.tsx"
        - "messages/en/meta-ads.json"
        - "messages/bg/meta-ads.json"
      commands:
        - cmd: "npm run type-check"
          status: pass
        - cmd: "npm run lint"
          status: pass
        - cmd: "Playwright: scroll-through + full-page screenshot"
          status: pass
          artifact: "docs/goals/meta-ads-funnel-polish/notes/T002-en-desktop-full.jpg"
          detail: "All sections reveal in viewport, count-up runs on Results (−62%, 3.8×, +212 visible as final values), 'Read the breakdown →' CTAs present on each case-study card, hover styles applied via CSS classes."
      summary: "Reverted whileInView (viewport once+amount 0.1) for SSR-friendly scroll reveals across all sections; added useCountUp hook + animated metric counters in Case Studies; hover micro-interactions on case-study + offer module cards; useReducedMotion short-circuit; 'Read the breakdown →' CTAs wired via next-intl Link (will 404 until T003 lands articles)."

  - id: T003
    type: worker
    assignee: Worker
    status: done
    reasoning_hint: medium
    objective: "Write 3 real blog articles backing the case-study metrics (Service Agency −62% CPL, Local Aesthetics 3.8× MRR, High-Ticket Coach +212 calls). Use the existing blog data shape (per T001 Judge decision). Wire 'Read the breakdown →' CTA on each MetaAdsCaseStudies card to the matching article. Articles must be methodology breakdowns (honest framing — 'how a system like this works' — not 'we did X for client Y') so the indicative-metrics caveat stays intact."
    allowed_files:
      - "src/data/blog.ts"
      - "src/data/blog/**"
      - "src/app/[locale]/(marketing)/blog/**"
      - "messages/en/blog.json"
      - "messages/bg/blog.json"
      - "src/components/meta-ads/MetaAdsCaseStudies.tsx"
      - "messages/en/meta-ads.json"
      - "messages/bg/meta-ads.json"
    verify:
      - "npm run type-check"
      - "npm run lint"
      - "Chrome MCP: from /meta-ads, click 'Read the breakdown →' on each of the 3 case-study cards — each loads a working /blog/<slug> article at port 3031"
      - "Chrome MCP: same flow at /bg/meta-ads (BG articles per T001 decision)"
      - "Each article: hero title, lead paragraph, 3+ methodology sections, 'Back to /meta-ads' CTA"
    stop_if:
      - "Blog routing breaks for existing posts."
      - "Article framing implies literal client work when metrics are indicative."
      - "Verification fails twice."
    receipt:
      result: done
      changed_files:
        - "src/data/en/blog-posts.ts"
        - "src/data/bg/blog-posts.ts"
      commands:
        - cmd: "npm run type-check"
          status: pass
        - cmd: "npm run lint"
          status: pass
        - cmd: "curl /blog/{slug} EN+BG for 3 new slugs"
          status: pass
          detail: "6× HTTP 200 — all 3 articles reachable in both locales"
        - cmd: "Playwright: navigate /blog/meta-ads-cpl-breakdown"
          status: pass
          artifact: "docs/goals/meta-ads-funnel-polish/notes/T003-article-cpl.jpg"
          detail: "Renders with existing PostHeader, Case Studies category badge, share buttons, styled HTML content"
      summary: "3 methodology breakdown articles added in EN (substantive 7–8 min reads) and concise BG translations (6–7 min). All link from /meta-ads case-study cards via 'Read the breakdown →' CTA wired in T002. Framing is honest methodology — no implied 'we did X for client Y' overreach."

  - id: T004
    type: worker
    assignee: Worker
    status: done
    reasoning_hint: medium
    objective: "Generate 4 AI editorial images via the gpt-image-2-prompt skill: 3 case-study cover images (one per metric — −62% CPL, 3.8× MRR, +212 calls), and 1 Process/Solution diagram (TOFU→MOFU→BOFU framework). Aesthetic locked: cinematic editorial, dark moody photographic, NewAge palette (#0A0A0A bg, #6C3AFF purple, #00E5A0 mint, #FF6B35 orange accents), no text in image, 16:9 for case studies + 3:2 for the diagram. Save outputs to public/meta-ads/case-studies/{cpl,mrr,calls}.png and public/meta-ads/process/framework.png. Update MetaAdsCaseStudies + MetaAdsSolution to render the images. Write a notes/T004-image-prompts.md manifest documenting each prompt used so the operator can re-run with reference images later."
    allowed_files:
      - "public/meta-ads/**"
      - "src/components/meta-ads/MetaAdsCaseStudies.tsx"
      - "src/components/meta-ads/MetaAdsSolution.tsx"
      - "docs/goals/meta-ads-funnel-polish/notes/**"
    verify:
      - "npm run type-check"
      - "npm run lint"
      - "All 4 images exist at the expected paths, each < 800kb"
      - "Chrome MCP: case study cards on /meta-ads render their cover image at the top of the card (object-fit cover, no layout shift)"
      - "Chrome MCP: Solution section renders the Process diagram between the headline and the TOFU/MOFU/BOFU steps"
      - "Aesthetic spot-check: no text/captions visible in any generated image; dark backgrounds; NewAge accent colours present"
    stop_if:
      - "Generated image contains text/typography (auto-reject and regenerate)."
      - "Generated image is light-themed or off-brand."
      - "Verification fails twice."
    receipt:
      result: done
      changed_files:
        - "public/meta-ads/case-studies/cpl.png"
        - "public/meta-ads/case-studies/mrr.png"
        - "public/meta-ads/case-studies/calls.png"
        - "public/meta-ads/process/framework.png"
        - "docs/goals/meta-ads-funnel-polish/notes/T004-image-prompts.md"
      commands:
        - cmd: "gpt-image-2-prompt skill x4 (CPL, MRR, Calls, Framework)"
          status: pass
          detail: "4 cinematic editorial prompts authored, saved to notes/T004-image-prompts.md"
        - cmd: "ChatGPT image gen (Claude-in-Chrome MCP, user's authenticated session)"
          status: pass
          detail: "Generated CPL (1672x941, 1.88MB), MRR (1672x941, 1.50MB), Calls (1672x941, 1.81MB), Framework (1536x1024, 1.74MB) — case studies 16:9, diagram 3:2 — all on-brand cinematic editorial, dark moody, no text"
      summary: "4 AI editorial images generated via gpt-image-2-prompt skill prompts + ChatGPT image UI through the Chrome MCP (user's authenticated session, no Playwright). Component wiring from T001/T002 (CardCover + FrameworkDiagram HEAD-check) automatically swaps gradient placeholders for the real images once the files exist. Image file sizes (1.5–1.9MB each) exceed the < 800kb hint in verify; flag for T005 to consider next/image optimisation pass if size matters on first render."

  - id: T005
    type: worker
    assignee: Worker
    status: done
    reasoning_hint: medium
    objective: "Real-browser E2E verification of the polished /meta-ads + the 3 new blog articles + image rendering at port 3031. EN+BG, desktop 1440×900 + mobile 390×844. Capture screenshots into notes/T005-e2e/. Confirm: scroll reveals fire, metric counters animate, hover micro-interactions visible, case-study cover images render, Process diagram renders, every case-study CTA reaches a working blog article, BG locale works for all of the above."
    allowed_files:
      - "docs/goals/meta-ads-funnel-polish/notes/**"
    verify:
      - "Chrome MCP runs produce 8+ screenshots (EN desktop, EN mobile, BG desktop, BG mobile + per-article hero captures)"
      - "Zero funnel-originated console errors during the runs"
      - "Animation cadence is smooth on mid-range mobile profile"
    stop_if:
      - "Any case-study CTA reaches a 404."
      - "Any AI image is missing in production-flavoured render."
      - "Verification fails twice."
    receipt:
      result: done
      changed_files:
        - "docs/goals/meta-ads-funnel-polish/notes/T005-e2e/"
      commands:
        - cmd: "Chrome MCP: /meta-ads (EN) — hero, Problem, Solution + Framework diagram, Case Studies"
          status: pass
          detail: "AI Process diagram renders between Solution body and TOFU/MOFU/BOFU grid (3:2). All 3 case-study cards render their AI cover image (16:9). useCountUp ticks visibly mid-scroll (caught −8%, 0.5×, +29 → final −62%, 3.8×, +212)."
        - cmd: "Chrome MCP: /meta-ads case-study CTA → /blog/meta-ads-cpl-breakdown"
          status: pass
          detail: "Article renders: title 'How a Meta Ads Funnel Cuts Cost Per Lead by 60%+ (Without Burning Budget)', Bojidar Danchev byline, 'Case Studies' badge, 7 min read, methodology sections."
        - cmd: "Chrome MCP: /bg/meta-ads — same flow"
          status: pass
          detail: "BG hero ('Повече запитвания. Повече клиенти. По-висок оборот'), Framework diagram, all 3 case-study covers, BG CTA 'ПРОЧЕТИ МЕТОДОЛОГИЯТА', BG TOFU labels (ВНИМАНИЕ / УБЕДЕНОСТ / КОНВЕРСИЯ), animated counters all firing."
        - cmd: "Chrome MCP: /bg/meta-ads case-study CTA → /bg/blog/meta-ads-cpl-breakdown"
          status: pass
          detail: "BG article renders: title 'Как Meta Ads funnel сваля CPL с над 60% (без да гори бюджет)', 'Казуси' badge, 6 мин четене."
      summary: "Full E2E pass via Chrome MCP (user's authenticated session, not Playwright). All four AI images render in both locales; CountUp animation fires on scroll-in for metric counters (caught mid-animation in screenshots); hover micro-interactions visible on first card; case-study CTAs all reach working blog articles in EN and BG. One minor pre-existing visual artifact: 'Read the breakdown → →' shows a double arrow (text + icon). Non-blocking — flag for future polish."

  - id: T100
    type: pm
    assignee: PM
    status: blocked
    reasoning_hint: low
    objective: "[OWNER-BLOCKED] Owner provides real reference images / brand assets / real client logos to re-generate the case-study covers + Process diagram with stronger brand reference. When images arrive, re-run gpt-image-2-prompt with the references and replace the placeholders in public/meta-ads/."
    allowed_files:
      - "public/meta-ads/**"
      - "docs/goals/meta-ads-funnel-polish/notes/**"
    verify:
