  - id: T999
    type: judge
    assignee: Judge
    status: done
    reasoning_hint: high
    objective: "Audit whether the polish tranche is complete — interactivity present and behaving, 3 articles wired and reachable, 4 AI images live and on-brand, EN+BG both pass at port 3031, screenshots captured."
    inputs:
      - "All done task receipts (T001–T005)"
      - "Screenshots under notes/T005-e2e/"
