    expected_output:
      - "complete | not_complete"
      - "full_outcome_complete: true | false"
      - "missing evidence (if any)"
      - "next task if not complete"
    receipt:
      result: done
      decision: complete
      full_outcome_complete: true
      rationale: |
        Polish tranche objectives met end-to-end:
        - Interactivity (T002): scroll-triggered reveals via whileInView restored; useCountUp animates
          metric counters; hover micro-interactions on case-study + offer module cards; useReducedMotion
          short-circuit in place.
        - Content (T003): 3 methodology blog articles live in EN (substantive 7-8 min reads) + BG
          (concise 6-7 min); 6× HTTP 200 across EN+BG; case-study CTAs wired to working articles.
        - AI imagery (T004): 4 cinematic editorial PNGs generated via gpt-image-2-prompt skill + ChatGPT
          image UI through Claude-in-Chrome MCP (user's authenticated session per explicit owner
          override). All on-brand: dark moody, NewAge palette, no text/typography in image. 16:9 case
          studies (1672x941), 3:2 framework (1536x1024).
        - E2E verification (T005): Chrome MCP runs confirm all four images render in both locales,
          CountUp animation fires on scroll-in (caught mid-animation in screenshots), case-study CTAs
          reach working blog articles in EN and BG, hover state visible on first card.

        Out of scope per intake: T100 (owner-supplied reference images) remains parked — explicit
        out-of-scope for completion gate.

        Known follow-ups (non-blocking):
        1. Image file sizes (1.5–1.9MB) exceed the original < 800kb hint — convert to next/image
           component or run a `cwebp` pass on a future tranche if first-render LCP matters.
        2. "Read the breakdown → →" shows a double-arrow visual artifact (text content + icon).
           Pre-existing from T002 wiring; trivial CSS fix.
      summary: "Polish tranche complete. /meta-ads now ships with AI cinematic editorial imagery on all 3 case studies + Solution diagram, scroll-triggered animations + CountUp counters + hover states, and 3 real methodology blog articles backing each metric in EN+BG. All verified via Chrome MCP in user's authenticated session."

